            background-size: cover;
            background-position: center top;
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== DARK OVERLAY so content stays readable ===== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: linear-gradient(
                to bottom,
                rgba(4, 8, 25, 0.45) 0%,
                rgba(4, 8, 25, 0.35) 40%,
                rgba(4, 8, 25, 0.65) 100%
            );
        }

        /* ===== SCAN LINE EFFECT ===== */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(4, 10, 30, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 56px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-bar-left {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 0.12em;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .top-bar-left .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);

<script>
    let allGames = [];

    function removeCLPrefix(filename) {
        if (filename.toLowerCase().startsWith('cl')) return filename.substring(2);
        return filename;
    }

    function formatGameName(name) {
        let f = removeCLPrefix(name);
        f = f.replace(/([A-Z])/g, ' $1');
        f = f.replace(/([0-9]+)/g, ' $1');
        f = f.replace(/\s+/g, ' ').trim();
        if (f.length > 0) f = f.charAt(0).toUpperCase() + f.slice(1);
        return f;
    }

    function normalizeFileName(name) {
        if (name.includes('.') && name.lastIndexOf('.') > 0) return name;
        return name + '.html';
    }

    function openGame(filename) {
        const normalized = normalizeFileName(filename);
        const encoded = encodeURIComponent(normalized);
        fetch(`https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile/UGS-Files/${encoded}?t=${Date.now()}`)
            .then(r => r.text())
            .then(text => {
                const w = window.open("about:blank", "_blank");
                if (w) { w.document.open(); w.document.write(text); w.document.close(); }
            })
            .catch(() => alert('Failed to load game. Please try again.'));
    }

    function renderGames(list) {
        const grid = document.getElementById('gamesGrid');
        const noResults = document.getElementById('noResults');
        const countEl = document.getElementById('gameCount');
        grid.innerHTML = '';

        if (list.length === 0) {
            noResults.style.display = 'block';
            countEl.innerHTML = '<strong>0</strong> games';
            return;
        }

        noResults.style.display = 'none';
        countEl.innerHTML = `<strong>${list.length}</strong> games`;

        list.forEach(game => {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.textContent = game.displayName;
            card.onclick = () => openGame(game.filename);
            grid.appendChild(card);
        });
    }
