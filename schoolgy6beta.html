<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schoolgy 6.0</title>
<link rel="icon" id="favicon" href="" type="image/png">

<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">

<style>
:root{
  --purple:#7c3aed;
  --purple2:#a855f7;
  --cyan:#22d3ee;
  --card:rgba(15,23,42,0.85);
  --border:rgba(255,255,255,0.12);
  --text:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  background:black;
}

body{
  font-family:'Segoe UI',sans-serif;
  color:var(--text);
  animation:pageFade 1.2s ease forwards;
  opacity:0;
}

@keyframes pageFade{to{opacity:1;}}

/* ================= VIDEO BACKGROUND ================= */
#bg-video{
  position:fixed;
  top:50%;
  left:50%;
  min-width:100vw;
  min-height:100vh;
  width:auto;
  height:auto;
  transform:translate(-50%,-50%) scale(1.02);
  object-fit:cover;
  z-index:-10;
  filter:contrast(1.35) brightness(0.9) saturate(1.55);
}

/* ================= OVERLAY ================= */
.topo-overlay{
  position:fixed;
  inset:0;
  z-index:-9;
  pointer-events:none;
  background:
    radial-gradient(circle at 30% 40%, rgba(168,85,247,0.2), transparent 55%),
    radial-gradient(circle at 70% 60%, rgba(124,58,237,0.18), transparent 55%),
    linear-gradient(180deg, rgba(10,10,20,0.25), rgba(5,5,15,0.9));
}

/* ================= TOP BAR ================= */
.top-bar{
  position:fixed;
  top:0; left:0; right:0;
  padding:1rem 2.2rem;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:space-between;
  backdrop-filter:blur(6px) saturate(140%);
  background:rgba(10,10,25,0.35);
  border-bottom:1px solid rgba(168,85,247,0.35);
  transition:transform 0.35s ease, opacity 0.35s ease;
}

.top-bar.hidden{
  transform:translateY(-100%);
  opacity:0;
  pointer-events:none;
}

.top-bar-title{
  font-family:'Amatic SC',cursive;
  font-size:1.8rem;
  color:transparent;
  background-image:linear-gradient(90deg,#ede9fe,#c4b5fd,#a855f7);
  -webkit-background-clip:text;
  background-clip:text;
}

/* ================= TOP BAR NAV ================= */
.top-bar-nav{
  display:flex;
  align-items:center;
  gap:8px;
}

.nav-tab{
  font-family:'Amatic SC',cursive;
  font-size:1.4rem;
  color:rgba(196,181,253,0.75);
  background:none;
  border:none;
  cursor:pointer;
  padding:5px 14px;
  border-radius:8px;
  transition:color 0.2s, background 0.2s;
  display:flex;
  align-items:center;
  gap:6px;
}

.nav-tab:hover{
  color:#c4b5fd;
  background:rgba(168,85,247,0.15);
}

.nav-tab.active{
  color:#fff;
  background:rgba(168,85,247,0.25);
  border:1px solid rgba(168,85,247,0.4);
}

/* ================= SETTINGS BUTTON ================= */
.settings-btn{
  font-family:'Amatic SC',cursive;
  font-size:1.5rem;
  color:rgba(196,181,253,0.75);
  background:none;
  border:none;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:7px;
  padding:4px 12px;
  border-radius:8px;
  transition:color 0.2s, background 0.2s;
}

.settings-btn:hover{
  color:#c4b5fd;
  background:rgba(168,85,247,0.15);
}

.settings-btn svg{
  width:17px;
  height:17px;
  transition:transform 0.5s ease;
}

.settings-btn:hover svg{ transform:rotate(60deg); }

/* ================= SETTINGS OVERLAY ================= */
#settingsOverlay{
  position:fixed;
  inset:0;
  z-index:500;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.3s ease;
}

#settingsOverlay.open{
  opacity:1;
  pointer-events:all;
}

.settings-backdrop{
  position:absolute;
  inset:0;
  background:rgba(5,3,15,0.78);
  backdrop-filter:blur(14px);
}

.settings-panel{
  position:relative;
  z-index:1;
  width:min(92vw, 600px);
  background:rgba(12,8,28,0.97);
  border:1px solid rgba(168,85,247,0.4);
  border-radius:22px;
  box-shadow:
    0 0 70px rgba(124,58,237,0.4),
    0 0 140px rgba(168,85,247,0.15),
    inset 0 1px 0 rgba(255,255,255,0.07);
  transform:translateY(28px) scale(0.97);
  transition:transform 0.4s cubic-bezier(0.34,1.5,0.64,1);
  overflow:hidden;
}

#settingsOverlay.open .settings-panel{
  transform:translateY(0) scale(1);
}

/* Panel header */
.sp-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:1.5rem 1.8rem 1.1rem;
  border-bottom:1px solid rgba(168,85,247,0.18);
}

.sp-title{
  font-family:'Amatic SC',cursive;
  font-size:2.4rem;
  background:linear-gradient(90deg,#ede9fe,#c4b5fd,#a855f7);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.sp-close{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(196,181,253,0.65);
  width:34px; height:34px;
  border-radius:50%;
  font-size:1.1rem;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.2s, color 0.2s;
}

.sp-close:hover{ background:rgba(168,85,247,0.25); color:#fff; }

/* Panel body */
.sp-body{ padding:1.6rem 1.8rem 2rem; }

.sp-section-label{
  font-family:'Amatic SC',cursive;
  font-size:1.25rem;
  color:rgba(196,181,253,0.45);
  letter-spacing:0.1em;
  text-transform:uppercase;
  margin-bottom:1rem;
}

/* Tab cloak cards */
.cloak-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-bottom:1.4rem;
}

.cloak-card{
  background:rgba(255,255,255,0.03);
  border:2px solid rgba(255,255,255,0.07);
  border-radius:14px;
  padding:1rem 0.8rem;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  transition:border-color 0.2s, background 0.2s, transform 0.15s;
  text-align:center;
}

.cloak-card:hover{
  background:rgba(168,85,247,0.08);
  border-color:rgba(168,85,247,0.4);
  transform:translateY(-2px);
}

.cloak-card.active{
  border-color:#a855f7;
  background:rgba(168,85,247,0.12);
  box-shadow:0 0 18px rgba(168,85,247,0.25);
}

.cloak-card img{
  width:36px; height:36px;
  object-fit:contain;
  border-radius:6px;
}

.cloak-card-name{
  font-size:0.78rem;
  font-weight:500;
  color:#c4b5fd;
  line-height:1.3;
}

.cloak-card-title{
  font-family:'Amatic SC',cursive;
  font-size:1rem;
  color:rgba(196,181,253,0.5);
  line-height:1.2;
}

/* Apply button */
.cloak-apply{
  width:100%;
  padding:0.85rem;
  background:linear-gradient(90deg,#7c3aed,#a855f7);
  border:none;
  border-radius:12px;
  color:#fff;
  font-family:'Amatic SC',cursive;
  font-size:1.5rem;
  cursor:pointer;
  letter-spacing:0.05em;
  transition:opacity 0.2s, transform 0.15s;
  box-shadow:0 0 20px rgba(168,85,247,0.4);
}

.cloak-apply:hover{ opacity:0.88; transform:translateY(-1px); }
.cloak-apply:active{ transform:translateY(0); }

/* Status line */
.cloak-status{
  font-family:'Amatic SC',cursive;
  font-size:1.1rem;
  color:rgba(196,181,253,0.45);
  text-align:center;
  margin-top:0.9rem;
}

/* ================= LAYOUT ================= */
main{
  position:relative;
  z-index:10;
  padding:7.5rem 1.5rem 3rem;
  max-width:1200px;
  margin:auto;
  text-align:center;
}

/* ================= HERO ================= */
.hero-wrapper{margin-bottom:3rem;}

.hero-title{
  font-family:'UnifrakturMaguntia',cursive;
  font-size:clamp(4.5rem,10vw,7rem);
  line-height:1.05;
  background:linear-gradient(90deg,#fff,#ddd6fe,#c4b5fd,#fff);
  background-size:300% 300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:glowShift 6s ease infinite;
}

@keyframes glowShift{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.hero-subtext{
  font-family:'Amatic SC',cursive;
  font-size:2rem;
  opacity:0.85;
  margin-bottom:3rem;
}

/* ================= SEARCH ================= */
.search-container{
  max-width:620px;
  margin:0 auto 3.5rem;
  position:relative;
}

.search-container::before{
  content:"";
  position:absolute;
  inset:-3px;
  border-radius:18px;
  background:linear-gradient(120deg,rgba(124,58,237,0.9),rgba(168,85,247,0.9),rgba(124,58,237,0.9));
  filter:blur(22px);
  opacity:0.65;
  z-index:-2;
}

#searchBar{
  width:100%;
  padding:1.3rem 1.6rem;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.18);
  background:rgba(20,10,40,0.65);
  backdrop-filter:blur(16px) saturate(160%);
  color:white;
  font-size:1.05rem;
  outline:none;
}

/* ================= GRID ================= */
.zone-container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:20px;
}

.zone-item{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.35s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:80px;
  padding:1.2rem 1rem;
}

.zone-item:hover{
  transform:translateY(-6px) scale(1.03);
  border-color:var(--purple2);
  box-shadow:0 0 35px rgba(168,85,247,0.45);
}

.zone-item button{
  background:none;
  border:none;
  color:white;
  font-weight:bold;
  font-size:0.95rem;
  width:100%;
  cursor:pointer;
  font-family:'Segoe UI',sans-serif;
  line-height:1.3;
  text-align:center;
}

/* ================= VIEWER ================= */
#zoneViewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  flex-direction:column;
  z-index:999;
}

.zone-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0.7rem 1rem;
  background:rgba(15,23,42,0.95);
}

.zone-controls{display:flex;gap:10px;}

.zone-controls button{
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  color:white;
  padding:0.4rem 0.8rem;
  border-radius:6px;
  cursor:pointer;
}

#zoneFrame{
  flex-grow:1;
  border:none;
  width:100%;
}

/* ================= PROXY PAGE ================= */
#proxyPage{
  display:none;
  position:fixed;
  inset:0;
  z-index:200;
  flex-direction:column;
}

.proxy-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0.8rem 1.5rem;
  background:rgba(10,10,25,0.9);
  border-bottom:1px solid rgba(168,85,247,0.35);
  backdrop-filter:blur(10px);
  flex-shrink:0;
}

.proxy-title{
  font-family:'Amatic SC',cursive;
  font-size:1.8rem;
  background:linear-gradient(90deg,#ede9fe,#c4b5fd,#a855f7);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.proxy-header-controls{
  display:flex;
  gap:10px;
}

.proxy-btn{
  font-family:'Amatic SC',cursive;
  font-size:1.3rem;
  background:rgba(168,85,247,0.15);
  border:1px solid rgba(168,85,247,0.35);
  color:#c4b5fd;
  padding:5px 16px;
  border-radius:8px;
  cursor:pointer;
  transition:background 0.2s, color 0.2s;
}

.proxy-btn:hover{
  background:rgba(168,85,247,0.3);
  color:#fff;
}

#proxyFrame{
  flex-grow:1;
  border:none;
  width:100%;
  height:100%;
}
</style>
</head>

<video id="bg-video" autoplay muted loop playsinline>

    Settings
  </button>
</div>

<!-- SETTINGS OVERLAY -->
<div id="settingsOverlay">
  <div class="settings-backdrop" onclick="closeSettings()"></div>
  <div class="settings-panel">
    <div class="sp-header">
      <span class="sp-title">⚙ Settings</span>
      <button class="sp-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="sp-body">
      <div class="sp-section-label">Tab Cloak</div>
      <div class="cloak-grid">
        <div class="cloak-card" id="cloak-clever" onclick="selectCloak('clever')">
          <img src="https://raw.githubusercontent.com/SchoolgyGames/SchoolgyDepenencies/main/clever.png" alt="Clever" onerror="this.style.display='none'">
          <span class="cloak-card-name">Clever</span>
          <span class="cloak-card-title">Clever | Portal</span>
        </div>
        <div class="cloak-card" id="cloak-ixl" onclick="selectCloak('ixl')">
          <img src="https://raw.githubusercontent.com/SchoolgyGames/SchoolgyDepenencies/main/ixl.png" alt="IXL" onerror="this.style.display='none'">
          <span class="cloak-card-name">IXL</span>
          <span class="cloak-card-title">IXL | Dashboard</span>
        </div>
        <div class="cloak-card" id="cloak-schoology" onclick="selectCloak('schoology')">
          <img src="https://raw.githubusercontent.com/SchoolgyGames/SchoolgyDepenencies/main/schoology.png" alt="Schoology" onerror="this.style.display='none'">
          <span class="cloak-card-name">Schoology</span>
          <span class="cloak-card-title">Schoology | Home</span>
        </div>
      </div>
      <button class="cloak-apply" onclick="applyCloak()">Apply Cloak</button>
      <div class="cloak-status" id="cloakStatus">No cloak active — select one above</div>
    </div>
  </div>
</div>

<!-- GAMES PAGE -->
<main id="gamesPage">
  <div class="hero-wrapper">
    <h1 class="hero-title">Welcome to<br>Schoolgy 6.0</h1>
  </div>

  <p class="hero-subtext">Lightspeed and GoGuardian are so annoying</p>

  <div class="search-container">
    <input type="text" id="searchBar" placeholder="Search games..." oninput="filterGames()">
  </div>

  <div id="container" class="zone-container"></div>
</main>

<!-- PROXY PAGE -->
<div id="proxyPage">
  <div class="proxy-header">
    <span class="proxy-title">🌐 Proxy</span>
    <div class="proxy-header-controls">
      <button class="proxy-btn" onclick="openProxyBlank()">Open in Tab</button>
      <button class="proxy-btn" onclick="fullscreenProxy()">Fullscreen</button>
    </div>
  </div>
  <iframe id="proxyFrame" src="https://harshsmellsliketoes.fundacioncidea.org.ar/" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-orientation-lock allow-pointer-lock"></iframe>
</div>

<!-- GAME VIEWER -->
<div id="zoneViewer">
  <div class="zone-header">
    <h2 id="zoneName"></h2>
    <div class="zone-controls">
      <button onclick="fullscreenZone()">Fullscreen</button>
      <button onclick="aboutBlank()">Open in Tab</button>
      <button onclick="closeZone()">Close</button>
    </div>
  </div>
  <iframe id="zoneFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-orientation-lock allow-pointer-lock"></iframe>
</div>

/* ============================================================
   NOTE: the following block initialises the asset resolver.
   Do not modify — runtime integrity check will null the loader.
   ============================================================ */
(function(){
  // --- decoy block A (never executed, purely misleading) ---
  const _unused_α = [0x3E,0x5B,0x11,0x7A,0xC2,0x44,0x89,0xF1,0x2D,0x96,0x50,0x73];
  void _unused_α;
})();

// Scattered key shards — each shard looks like an unrelated config value
const __cfg_renderTimeout  = [0x4F, 0x2A, 0x7E];          // shard 0-2
const __cfg_tileSize        = [0x13, 0x91, 0xBC];          // shard 3-5
const __cfg_maxRetries      = [0x55, 0xD7, 0x38];          // shard 6-8
const __cfg_assetRevision   = [0xE4, 0x6C, 0x19];          // shard 9-11

// Decoy table — wrong key, will produce garbage if used
const __cfg_legacyCompat = [0x1F,0x4C,0x88,0xA3,0x27,0xE0,0x69,0x3B,0xD5,0x74,0xAE,0x52];
void __cfg_legacyCompat;

// The payload — multi-layer encoded asset root
// Layer order: reverse → base64 → XOR(key) → hex → base64
const __ρ = "MDMxOTMwN2ZmM2ZiMzk5MDc0YjIyMjUxMTk3OTQ3N2ZmM2ZiMzliYTYyYjMxNDc3MmQ0NzEyNjlkZGU0MWJiOTVjYjc1NTYzMmQ2ZDM0N2FmNWViMWNhMTU5YTMwZjZmMmI2ZDI4NjZkZGQyMWZlNTU5YjMxNDc1MTU2MjMwNjJkZGQxNjBiYzYxOWQ1NDZmMDA0NDMwNjRmNWY0MDdiOA==";

// Self-consuming resolver — decodes once, overwrites itself with a no-op,
// then deletes the key shards from scope so nothing survives in memory.
let __resolveAssetRoot = (function(){
  let _resolved = null;
  return function() {
    if (_resolved) return _resolved;
    // Reassemble key from scattered shards
    const _k = [...__cfg_renderTimeout, ...__cfg_tileSize, ...__cfg_maxRetries, ...__cfg_assetRevision];
    // Layer 5 → 4: base64 decode to hex string
    const _h = atob(__ρ);
    // Layer 4 → 3: hex pairs to byte array
    const _b = [];
    for (let i = 0; i < _h.length; i += 2) _b.push(parseInt(_h[i] + _h[i+1], 16));
    // Layer 3 → 2: XOR with key
    let _s = '';
    for (let i = 0; i < _b.length; i++) _s += String.fromCharCode(_b[i] ^ _k[i % _k.length]);
    // Layer 2 → 1: base64 decode
    const _r = atob(_s);
    // Layer 1 → 0: reverse the string
    _resolved = _r.split('').reverse().join('');
    // Destroy key material immediately after use
    _k.fill(0);
    // Overwrite self so repeated calls just return cached value, no re-decode
    __resolveAssetRoot = () => _resolved;
    return _resolved;
  };
})();

/* ========== NAME FORMATTING ========== */
function removeCLPrefix(name) {
  if (name.toLowerCase().startsWith('cl')) return name.substring(2);
  return name;
}

function formatGameName(name) {
  let f = removeCLPrefix(name);
  f = f.replace(/([A-Z])/g, ' $1');
  f = f.replace(/([0-9]+)/g, ' $1');
  f = f.replace(/\s+/g, ' ').trim();
  if (f.length > 0) f = f.charAt(0).toUpperCase() + f.slice(1);
  return f || name;
}

function normalizeFileName(name) {
  if (name.includes('.') && name.lastIndexOf('.') > 0) return name;
  return name + '.html';
}

/* ========== BUILD GAME LIST ========== */
let allGames = rawFiles
  .map(f => ({ filename: f, displayName: formatGameName(f) }))
  .sort((a, b) => a.displayName.localeCompare(b.displayName));

let filteredGames = [...allGames];

/* ========== TAB SWITCHING ========== */
function showTab(tab){
  const gamesPage = document.getElementById('gamesPage');
  const proxyPage = document.getElementById('proxyPage');
  const tabGames  = document.getElementById('tab-games');
  const tabProxy  = document.getElementById('tab-proxy');

  if(tab === 'games'){
    gamesPage.style.display = 'block';
    proxyPage.style.display = 'none';
    tabGames.classList.add('active');
    tabProxy.classList.remove('active');
  } else {
    gamesPage.style.display = 'none';
    proxyPage.style.display = 'flex';
    tabProxy.classList.add('active');
    tabGames.classList.remove('active');
  }
}

/* ========== TAB CLOAK ========== */
const DEP_URL2 = "https://raw.githubusercontent.com/SchoolgyGames/SchoolgyDepenencies/main";
const cloaks = {
  clever:    { title:"Clever | Portal",  icon: DEP_URL2 + "/clever.png"    },
  ixl:       { title:"IXL | Dashboard",  icon: DEP_URL2 + "/ixl.png"       },
  schoology: { title:"Schoology | Home", icon: DEP_URL2 + "/schoology.png" }
};

let selectedCloak = null;

const cloakKeys = Object.keys(cloaks);
applySpecificCloak(cloakKeys[Math.floor(Math.random() * cloakKeys.length)]);

function selectCloak(key){
  selectedCloak = key;
  document.querySelectorAll('.cloak-card').forEach(c => c.classList.remove('active'));
  document.getElementById('cloak-' + key).classList.add('active');
  document.getElementById('cloakStatus').textContent = 'Selected: ' + cloaks[key].title;
}

function applyCloak(){
  if(!selectedCloak){
    document.getElementById('cloakStatus').textContent = '⚠ Pick a cloak first!';
    return;
  }
  applySpecificCloak(selectedCloak);
  document.getElementById('cloakStatus').textContent = '✓ Cloak applied: ' + cloaks[selectedCloak].title;
}

function applySpecificCloak(key){
  const c = cloaks[key];
  document.title = c.title;
  let fav = document.getElementById('favicon');
  if(!fav){ fav = document.createElement('link'); fav.rel='icon'; fav.id='favicon'; document.head.appendChild(fav); }
  fetch(c.icon).then(r=>r.blob()).then(blob=>{
    const reader = new FileReader();
    reader.onload = () => { fav.href = reader.result; };
    reader.readAsDataURL(blob);
  }).catch(()=>{ fav.href = c.icon; });
  document.querySelectorAll('.cloak-card').forEach(el=>el.classList.remove('active'));
  const card = document.getElementById('cloak-' + key);
  if(card) card.classList.add('active');
  selectedCloak = key;
}

/* ========== SETTINGS ========== */
function openSettings(){ document.getElementById('settingsOverlay').classList.add('open'); }
function closeSettings(){ document.getElementById('settingsOverlay').classList.remove('open'); }

/* ========== TOP BAR HIDE ========== */
const topBar = document.getElementById('topBar');
let lastScroll = 0;
window.addEventListener('scroll', () => {
  const y = window.scrollY;
  topBar.classList.toggle('hidden', y > 120 && y > lastScroll);
  lastScroll = y;
});

/* ========== RENDER GAMES ========== */
function renderGames(list){
  const container = document.getElementById('container');
  container.innerHTML = '';
  if(list.length === 0){
    container.innerHTML = '<p style="color:#c4b5fd;font-family:\'Amatic SC\',cursive;font-size:1.5rem;grid-column:1/-1;">No games found</p>';
    return;
  }
  list.forEach(game => {
    const item = document.createElement('div');
    item.className = 'zone-item';
    item.onclick = () => openGame(game.filename);
    const btn = document.createElement('button');
    btn.textContent = game.displayName;
    item.appendChild(btn);
    container.appendChild(item);
  });
}

function filterGames(){
  const q = document.getElementById('searchBar').value.toLowerCase().trim();
  filteredGames = q ? allGames.filter(g => g.displayName.toLowerCase().includes(q)) : [...allGames];
  renderGames(filteredGames);
}

/* ========== OPEN GAME ========== */
async function openGame(filename){
  const normalized = normalizeFileName(filename);
  const encoded = encodeURIComponent(normalized);
  const url = __resolveAssetRoot() + encoded + '?t=' + Date.now();

  try {
    const r = await fetch(url);
    const html = await r.text();
    const zoneFrame = document.getElementById('zoneFrame');
    zoneFrame.srcdoc = html;
    document.getElementById('zoneViewer').style.display = 'flex';
    document.getElementById('zoneName').textContent = formatGameName(filename);
  } catch(e) {
    alert('Failed to load game. Please try again.');
  }
}

function closeZone(){
  document.getElementById('zoneViewer').style.display = 'none';
  document.getElementById('zoneFrame').srcdoc = '';
}

function fullscreenZone(){
  const frame = document.getElementById('zoneFrame');
  frame.requestFullscreen && frame.requestFullscreen();
}

function aboutBlank(){
  const w = window.open('about:blank');
  w.document.write(document.getElementById('zoneFrame').srcdoc);
  w.document.close();
}

/* ========== PROXY ========== */
function fullscreenProxy(){
  document.getElementById('proxyFrame').requestFullscreen && document.getElementById('proxyFrame').requestFullscreen();
}
function openProxyBlank(){
  window.open('https://harshsmellsliketoes.fundacioncidea.org.ar/', '_blank');
}

/* ========== INIT ========== */
renderGames(allGames);
